apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: casopractico2
  labels:
    app: casopractico2
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
        tier: frontend
        project: casopractico2
    spec:
      containers:
        - name: nodejs
          image: devopsyapy.azurecr.io/nodejs-redis:casopractico2
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
